<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - UK Architects</title>
    <meta name="description" content="UK-Architects — international architectural bureau with English management">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans', sans-serif;
            background: #1a1a1a;
            color: #ffffff;
        }

        /* Header styles moved to header.html */

        .hero-section {
            padding: 140px 60px 80px 60px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        }

        .hero-section h1 {
            font-family: 'Ubuntu', sans-serif;
            font-weight: 400;
            font-size: 56px;
            color: #ffffff;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .content-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            padding: 80px 60px;
            align-items: center;
        }

        .content-section:nth-child(even) {
            background: #1a1a1a;
        }

        .content-section:nth-child(odd) {
            background: #222222;
        }

        .content-section.reverse {
            grid-template-columns: 1fr 1fr;
        }

        .content-section.reverse .text-content {
            order: 2;
        }

        .content-section.reverse .image-content {
            order: 1;
        }

        .text-content h2 {
            font-family: 'Ubuntu', sans-serif;
            font-weight: 400;
            font-size: 38px;
            color: #ffffff;
            margin-bottom: 25px;
            line-height: 1.3;
        }

        .text-content p {
            font-family: 'Noto Sans', sans-serif;
            font-size: 17px;
            color: #cccccc;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .image-content {
            width: 100%;
            height: 450px;
            border-radius: 15px;
            overflow: hidden;
        }

        .image-content img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .image-content:hover img {
            transform: scale(1.05);
        }

        /* Lang switcher styles moved to header.html */

        @media (max-width: 968px) {
            .hero-section {
                padding: 120px 40px 60px 40px;
            }

            .hero-section h1 {
                font-size: 38px;
            }

            .content-section {
                grid-template-columns: 1fr;
                gap: 40px;
                padding: 60px 40px;
            }

            .content-section.reverse .text-content {
                order: 1;
            }

            .content-section.reverse .image-content {
                order: 2;
            }

            .text-content h2 {
                font-size: 28px;
            }

            .text-content p {
                font-size: 16px;
            }

            .image-content {
                height: 300px;
            }
        }

        @media (max-width: 640px) {
            .hero-section {
                padding: 100px 25px 40px 25px;
            }

            .hero-section h1 {
                font-size: 32px;
            }

            .content-section {
                padding: 40px 25px;
            }

            .text-content h2 {
                font-size: 24px;
            }

            .image-content {
                height: 250px;
            }
        }
    </style>
</head>

<body>
    <!-- Shared header from header.html -->
    <div id="header-placeholder"></div>

    <section class="hero-section">
        <h1 id="about-page-heading">About Us</h1>
        <p id="about-page-hero-subtitle"
            style="margin-top: 18px; max-width: 900px; color: #cccccc; font-size: 18px; line-height: 1.8;"></p>
    </section>

    <div id="dynamic-sections"></div>

    <script>
        const API_URL = '/api';

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function formatInline(text) {
            return escapeHtml(text)
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>');
        }

        function parseMarkdown(text) {
            const lines = text.replace(/\r/g, '').split('\n');
            const blocks = [];
            let paragraphLines = [];

            const flushParagraph = () => {
                if (paragraphLines.length) {
                    blocks.push(`<p>${paragraphLines.join(' ')}</p>`);
                    paragraphLines = [];
                }
            };

            lines.forEach(line => {
                const trimmed = line.trim();
                if (!trimmed) {
                    flushParagraph();
                    return;
                }

                const headingMatch = trimmed.match(/^(#{1,6})\s+(.+)$/);
                if (headingMatch) {
                    flushParagraph();
                    const level = Math.min(6, headingMatch[1].length);
                    blocks.push(`<h${level}>${formatInline(headingMatch[2])}</h${level}>`);
                } else {
                    paragraphLines.push(formatInline(trimmed));
                }
            });

            flushParagraph();
            return blocks.join('');
        }

        function renderSectionContent(content) {
            if (!content) return '';
            const looksLikeHtml = /<[^>]+>/.test(content);
            return looksLikeHtml ? content : parseMarkdown(content);
        }

        async function loadSections() {
            try {
                const [aboutResponse, sectionsResponse] = await Promise.all([
                    fetch(`${API_URL}/sections/about?lang=en`),
                    fetch(`${API_URL}/sections?lang=en`)
                ]);

                if (!aboutResponse.ok) throw new Error('About section not found');
                if (!sectionsResponse.ok) throw new Error('Sections not found');

                const aboutSection = await aboutResponse.json();
                const sections = await sectionsResponse.json();
                const allSections = [aboutSection].concat(Array.isArray(sections) ? sections.filter(section => section.slug !== 'about') : []);

                const headingEl = document.getElementById('about-page-heading');
                const heroSubtitleEl = document.getElementById('about-page-hero-subtitle');

                if (aboutSection.title) {
                    headingEl.textContent = aboutSection.title;
                }

                if (aboutSection.subtitle) {
                    heroSubtitleEl.textContent = aboutSection.subtitle;
                }

                const container = document.getElementById('dynamic-sections');
                container.innerHTML = allSections.map((section, index) => {
                    const imageUrl = section.background_image || 'images/OKompanii.jpeg';
                    const contentHtml = renderSectionContent(section.content || '');
                    const reverseClass = index % 2 === 1 ? 'reverse' : '';

                    return `
                        <section class="content-section ${reverseClass}">
                            <div class="text-content">
                                ${section.title ? `<h2>${section.title}</h2>` : ''}
                                ${section.subtitle ? `<p style="margin-bottom: 20px; color: #d4d4d4;">${section.subtitle}</p>` : ''}
                                <div>${contentHtml}</div>
                            </div>
                            <div class="image-content">
                                <img src="${imageUrl}" alt="${section.title || 'About section'}">
                            </div>
                        </section>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading sections:', error);
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadSections);
        } else {
            loadSections();
        }
    </script>

    <script>
        // Load shared header
        fetch('/header.html')
            .then(response => response.text())
            .then(html => {
                const placeholder = document.getElementById('header-placeholder');
                if (placeholder) {
                    placeholder.innerHTML = html;

                    // Initialize header scroll behavior after loading
                    let lastScrollTop = 0;
                    const header = document.querySelector('header');
                    const langSwitcher = document.querySelector('.fixed-lang-switcher');

                    window.addEventListener('scroll', function () {
                        let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

                        if (scrollTop <= 100) {
                            if (header) header.style.top = '0';
                            if (langSwitcher) langSwitcher.style.top = '20px';
                        } else if (scrollTop > lastScrollTop) {
                            if (header) header.style.top = '-75px';
                            if (langSwitcher) langSwitcher.style.top = '-75px';
                        } else {
                            if (header) header.style.top = '0';
                            if (langSwitcher) langSwitcher.style.top = '20px';
                        }

                        lastScrollTop = scrollTop;
                    });

                    // Initialize services dropdown if function exists
                    setTimeout(() => {
                        if (typeof loadServicesDropdown === 'function') loadServicesDropdown();
                        if (typeof initServicesToggle === 'function') initServicesToggle();
                        if (typeof initMobileMenu === 'function') initMobileMenu();
                    }, 100);
                }
            })
            .catch(error => console.error('Error loading header:', error));
    </script>

    <script>
        (function () {
            function loadSharedFooter() {
                fetch('/footer.html')
                    .then(response => response.text())
                    .then(html => {
                        const existingFooter = document.querySelector('body > footer');
                        if (existingFooter) existingFooter.remove();

                        const temp = document.createElement('div');
                        temp.innerHTML = html;

                        const footer = temp.querySelector('footer');
                        const styles = temp.querySelectorAll('style');
                        const scripts = temp.querySelectorAll('script');

                        if (footer) document.body.appendChild(footer);
                        styles.forEach(style => document.head.appendChild(style.cloneNode(true)));
                        scripts.forEach(oldScript => {
                            const newScript = document.createElement('script');
                            newScript.textContent = oldScript.textContent;
                            document.body.appendChild(newScript);
                        });
                    })
                    .catch(error => console.error('Error loading footer:', error));
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', loadSharedFooter);
            } else {
                loadSharedFooter();
            }
        })();
    </script>
</body>

</html>
