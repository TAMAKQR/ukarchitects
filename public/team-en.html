<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team - UK Architects</title>
    <meta name="description" content="Team of professionals at UK-Architects">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="js/header-contacts.js" defer></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans', sans-serif;
            background: #1a1a1a;
            color: #ffffff;
        }

        /* Header styles moved to header.html */

        .hero-section {
            padding: 140px 60px 80px 60px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        }

        .hero-section h1 {
            font-family: 'Ubuntu', sans-serif;
            font-weight: 400;
            font-size: 56px;
            color: #ffffff;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .team-grid {
            padding: 80px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .team-card {
            background: #222222;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
        }

        .team-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .team-photo {
            width: 100%;
            height: 350px;
            overflow: hidden;
            background: #2a2a2a;
        }

        .team-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .team-card:hover .team-photo img {
            transform: scale(1.1);
        }

        .team-info {
            padding: 30px;
        }

        .team-name {
            font-family: 'Ubuntu', sans-serif;
            font-weight: 500;
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .team-position {
            font-family: 'Noto Sans', sans-serif;
            font-size: 16px;
            color: #999999;
            margin-bottom: 15px;
        }

        .team-bio {
            font-family: 'Noto Sans', sans-serif;
            font-size: 15px;
            color: #cccccc;
            line-height: 1.7;
        }

        .loading {
            text-align: center;
            padding: 100px 0;
            color: #999;
            font-size: 18px;
        }

        /* Lang switcher styles moved to header.html */

        @media (max-width: 968px) {
            .hero-section {
                padding: 120px 40px 60px 40px;
            }

            .hero-section h1 {
                font-size: 38px;
            }

            .team-grid {
                padding: 60px 40px;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }
        }

        @media (max-width: 640px) {
            .hero-section {
                padding: 100px 25px 40px 25px;
            }

            .hero-section h1 {
                font-size: 32px;
            }

            .team-grid {
                padding: 40px 25px;
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Shared header from header.html -->
    <div id="header-placeholder"></div>

    <section class="hero-section">
        <h1>Our Team</h1>
    </section>

    <div class="team-grid" id="team-container">
        <div class="loading">Loading team...</div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : 'https://uk-architects.onrender.com/api';

        function sanitizeMediaUrl(url) {
            if (!url) return '';
            if (url.startsWith('http://') || url.startsWith('https://')) {
                return url;
            }
            if (url.startsWith('/')) {
                return url;
            }
            return '/' + url;
        }

        async function loadTeam() {
            try {
                const response = await fetch(`${API_URL}/team?lang=en`);
                const team = await response.json();

                const container = document.getElementById('team-container');

                if (team.length === 0) {
                    container.innerHTML = '<div class="loading">No team members yet</div>';
                    return;
                }

                container.innerHTML = team.map(member => {
                    const photoUrl = sanitizeMediaUrl(member.photo_url);
                    return `
                        <div class="team-card">
                            ${photoUrl ? `
                                <div class="team-photo">
                                    <img src="${photoUrl}" alt="${member.name}">
                                </div>
                            ` : '<div class="team-photo"></div>'}
                            <div class="team-info">
                                <h2 class="team-name">${member.name}</h2>
                                <p class="team-position">${member.position}</p>
                                ${member.bio ? `<p class="team-bio">${member.bio}</p>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading team:', error);
                document.getElementById('team-container').innerHTML = '<div class="loading">Error loading team</div>';
            }
        }

        // Load shared header
        fetch('/header.html')
            .then(response => response.text())
            .then(html => {
                const placeholder = document.getElementById('header-placeholder');
                if (placeholder) {
                    placeholder.innerHTML = html;

                    // Initialize header scroll behavior after loading
                    let lastScrollTop = 0;
                    const header = document.querySelector('header');
                    const langSwitcher = document.querySelector('.fixed-lang-switcher');

                    window.addEventListener('scroll', function () {
                        let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

                        if (scrollTop <= 100) {
                            if (header) header.style.top = '0';
                            if (langSwitcher) langSwitcher.style.top = '20px';
                        } else if (scrollTop > lastScrollTop) {
                            if (header) header.style.top = '-75px';
                            if (langSwitcher) langSwitcher.style.top = '-75px';
                        } else {
                            if (header) header.style.top = '0';
                            if (langSwitcher) langSwitcher.style.top = '20px';
                        }

                        lastScrollTop = scrollTop;
                    });

                    // Initialize services dropdown if function exists
                    setTimeout(() => {
                        if (typeof loadServicesDropdown === 'function') loadServicesDropdown();
                        if (typeof initServicesToggle === 'function') initServicesToggle();
                        if (typeof initMobileMenu === 'function') initMobileMenu();
                    }, 100);
                }
            })
            .catch(error => console.error('Error loading header:', error));

        loadTeam();

        document.addEventListener('DOMContentLoaded', () => {
            if (window.refreshMobileContacts) {
                window.refreshMobileContacts();
            }
        });
    </script>

    <script>
        (function () {
            function loadSharedFooter() {
                fetch('/footer.html')
                    .then(response => response.text())
                    .then(html => {
                        const existingFooter = document.querySelector('body > footer');
                        if (existingFooter) existingFooter.remove();

                        const temp = document.createElement('div');
                        temp.innerHTML = html;

                        const footer = temp.querySelector('footer');
                        const styles = temp.querySelectorAll('style');
                        const scripts = temp.querySelectorAll('script');

                        if (footer) document.body.appendChild(footer);
                        styles.forEach(style => document.head.appendChild(style.cloneNode(true)));
                        scripts.forEach(oldScript => {
                            const newScript = document.createElement('script');
                            newScript.textContent = oldScript.textContent;
                            document.body.appendChild(newScript);
                        });
                    })
                    .catch(error => console.error('Error loading footer:', error));
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', loadSharedFooter);
            } else {
                loadSharedFooter();
            }
        })();
    </script>
</body>

</html>
