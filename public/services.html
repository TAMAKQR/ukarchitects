<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Услуги - UK Architects</title>
    <meta name="description" content="Архитектурные услуги UK-Architects">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script src="js/header-contacts.js" defer></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans', sans-serif;
            background: #1a1a1a;
            color: #ffffff;
        }

        /* Header styles moved to header.html */

        .hero-section {
            padding: 140px 60px 80px 60px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        }

        .hero-section h1 {
            font-family: 'Ubuntu', sans-serif;
            font-weight: 400;
            font-size: 56px;
            color: #ffffff;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        .services-grid {
            padding: 80px 60px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            max-width: 980px;
            margin: 0 auto;
        }

        .service-card {
            background: #222222;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .service-image {
            width: 100%;
            height: 250px;
            overflow: hidden;
        }

        .service-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .service-card:hover .service-image img {
            transform: scale(1.1);
        }

        .service-content {
            padding: 30px;
        }

        .service-title {
            font-family: 'Ubuntu', sans-serif;
            font-weight: 400;
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .service-description {
            font-family: 'Noto Sans', sans-serif;
            font-size: 16px;
            color: #cccccc;
            line-height: 1.7;
            max-width: 100%;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        /* Rich content inside description (from admin editor) */
        .service-description * {
            max-width: 100%;
        }

        .service-description img {
            max-width: 100% !important;
            height: auto !important;
            display: block;
            margin: 12px 0;
            border-radius: 8px;
        }

        .service-description a {
            color: inherit;
            text-decoration: underline;
            overflow-wrap: anywhere;
        }

        .service-description iframe,
        .service-description video,
        .service-description embed {
            max-width: 100%;
            height: auto;
        }

        .service-description table {
            width: 100%;
            max-width: 100%;
            border-collapse: collapse;
            display: block;
            overflow-x: auto;
        }

        .loading {
            text-align: center;
            padding: 100px 0;
            color: #999;
            font-size: 18px;
        }

        /* Lang switcher styles moved to header.html */

        @media (max-width: 968px) {
            .hero-section {
                padding: 120px 40px 60px 40px;
            }

            .hero-section h1 {
                font-size: 38px;
            }

            .services-grid {
                padding: 60px 40px;
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .hero-section {
                padding: 100px 25px 40px 25px;
            }

            .hero-section h1 {
                font-size: 32px;
            }

            .services-grid {
                padding: 40px 25px;
            }

            .service-title {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <!-- Shared header from header.html -->
    <div id="header-placeholder"></div>

    <section class="hero-section">
        <h1>Наши услуги</h1>
    </section>

    <div class="services-grid" id="services-container">
        <div class="loading">Загрузка услуг...</div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : 'https://uk-architects.onrender.com/api';

        function sanitizeMediaUrl(url) {
            if (!url) return '';
            if (url.startsWith('http://') || url.startsWith('https://')) {
                return url;
            }
            if (url.startsWith('/')) {
                return url;
            }
            return '/' + url;
        }

        async function loadServices() {
            try {
                const response = await fetch(`${API_URL}/services`);
                const services = await response.json();

                const container = document.getElementById('services-container');

                if (services.length === 0) {
                    container.innerHTML = '<div class="loading">Услуги пока не добавлены</div>';
                    return;
                }

                container.innerHTML = services.map(service => {
                    const imageUrl = sanitizeMediaUrl(service.image_url);
                    return `
                        <div class="service-card">
                            ${imageUrl ? `
                                <div class="service-image">
                                    <img src="${imageUrl}" alt="${service.title_ru || service.title}">
                                </div>
                            ` : ''}
                            <div class="service-content">
                                <h2 class="service-title">${service.title_ru || service.title}</h2>
                                <div class="service-description">${service.description_ru || service.description}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Ошибка загрузки услуг:', error);
                document.getElementById('services-container').innerHTML = '<div class="loading">Ошибка загрузки услуг</div>';
            }
        }

        // Load shared header
        fetch('/header.html')
            .then(response => response.text())
            .then(html => {
                const placeholder = document.getElementById('header-placeholder');
                if (placeholder) {
                    placeholder.innerHTML = html;

                    // Initialize header scroll behavior after loading
                    let lastScrollTop = 0;
                    const header = document.querySelector('header');
                    const langSwitcher = document.querySelector('.fixed-lang-switcher');

                    window.addEventListener('scroll', function () {
                        let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

                        if (scrollTop <= 100) {
                            if (header) header.style.top = '0';
                            if (langSwitcher) langSwitcher.style.top = '20px';
                        } else if (scrollTop > lastScrollTop) {
                            if (header) header.style.top = '-75px';
                            if (langSwitcher) langSwitcher.style.top = '-75px';
                        } else {
                            if (header) header.style.top = '0';
                            if (langSwitcher) langSwitcher.style.top = '20px';
                        }

                        lastScrollTop = scrollTop;
                    });

                    // Initialize services dropdown if function exists
                    setTimeout(() => {
                        if (typeof loadServicesDropdown === 'function') loadServicesDropdown();
                        if (typeof initServicesToggle === 'function') initServicesToggle();
                        if (typeof initMobileMenu === 'function') initMobileMenu();
                    }, 100);
                }
            })
            .catch(error => console.error('Error loading header:', error));

        loadServices();

        document.addEventListener('DOMContentLoaded', () => {
            if (window.refreshMobileContacts) {
                window.refreshMobileContacts();
            }
        });
    </script>

    <script>
        (function () {
            function loadSharedFooter() {
                fetch('/footer.html')
                    .then(response => response.text())
                    .then(html => {
                        const existingFooter = document.querySelector('body > footer');
                        if (existingFooter) existingFooter.remove();
                        document.body.insertAdjacentHTML('beforeend', html);
                    })
                    .catch(error => console.error('Error loading footer:', error));
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', loadSharedFooter);
            } else {
                loadSharedFooter();
            }
        })();
    </script>
</body>

</html>
